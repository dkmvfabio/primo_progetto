{% extends 'base.html' %}
{% block content%}
<h2> Lista contatti</h2>
<table class= "table table-striped">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Cognome</th>
            <th>Email</th>
            <th>Contenuto</th>
        </tr>
    </thead>
    <tbody>
        {% for contatto in contatti%}
            <tr>
                <td>{{contatto.nome}}</td>
                <td>{{contatto.cognome}}</td>
                <td>{{contatto.email}}</td>
                <td>{{contatto.contenuto}}</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
